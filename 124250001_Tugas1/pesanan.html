<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Form Pemesanan - JB AmdStore</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Link ke css -->
    <link rel="stylesheet" href="jb.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark shadow-lg sticky-top">
        <div class="container">
            
        </div>
    </nav>
>
    <div class="container mt-5 mb-5">

        <div class="card form-card text-white p-4 shadow-lg fade show">

            <h3 class="text-danger text-center mb-4">Pemesanan JB AmdStore</h3>

            <div class="text-center mb-4">
                <img src="logo.jpeg" class="rounded-circle shadow-lg mb-4m logo-jb" width="200" height="200">
            </div>

            <div class="alert alert-success collapse" id="successAlert">
                Pesanan berhasil dikirim!
            </div>

            <form action="terimakasih.html">

                <div class="mb-3">
                    <label class="form-label">Nama Pembeli</label>
                    <input type="text" class="form-control" placeholder="Masukkan nama Anda" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Alamat</label>
                    <textarea class="form-control" placeholder="Masukkan alamat lengkap" required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">No HP</label>
                    <input type="text" class="form-control" placeholder="08xxxxxxxxxx" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Jumlah Pesanan</label>
                    <input type="number" class="form-control" min="1" value="1">
                </div>
                <div class="mb-3">
                    <label class="form-label">Metode Pembayaran</label>
                    <select class="form-select">
                        <option>Transfer Bank</option>
                        <option>DANA</option>
                        <option>OVO</option>
                        <option>GoPay</option>
                    </select>
                </div>
                <button class="btn btn-danger w-100 mt-3" type="submit">
                    <span class="spinner-border spinner-border-sm d-none" id="loading"></span>
                    Submit
                </button>
            </form>
        </div>
    </div>
    <footer class="text-white">
        Privacy Policy * Support * 2026 JB AmdStore
    </footer>
</body>
</html>
